services:
  app:
    build: .
    container_name: brownies-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/brownies.db
      - JWT_SECRET=${JWT_SECRET:-brownies-dev-secret-replace-in-production}
      - DEBUG=${DEBUG:-true}
      - UPLOAD_DIR=/app/data/uploads
      - OTP_BYPASS=123456
    volumes:
      - brownies-data:/app/data
      - .:/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/api/v1/health').raise_for_status()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  brownies-data:
