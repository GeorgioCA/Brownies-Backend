services:
  brownies:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: brownies-api
    expose:
      - "8000"
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///app/data/brownies.db
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production-use-64-char-random}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - DEBUG=${DEBUG:-false}
      - UPLOAD_DIR=/app/data/uploads
      - OTP_BYPASS=${OTP_BYPASS:-}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID:-}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN:-}
      - TWILIO_PHONE=${TWILIO_PHONE:-}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      - REFRESH_TOKEN_EXPIRE_DAYS=${REFRESH_TOKEN_EXPIRE_DAYS:-30}
    volumes:
      - brownies-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "from urllib.request import urlopen; urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  brownies-data:
