services:
  db:
    image: postgres:16-alpine
    container_name: brownies-db
    expose:
      - "5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-brownies}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-brownies}
      - POSTGRES_DB=${POSTGRES_DB:-brownies}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  brownies:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: brownies-api
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-brownies}:${POSTGRES_PASSWORD:-brownies}@db:5432/${POSTGRES_DB:-brownies}
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production-use-64-char-random}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - DEBUG=${DEBUG:-false}
      - UPLOAD_DIR=/app/data/uploads
      - OTP_BYPASS=${OTP_BYPASS:-}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID:-}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN:-}
      - TWILIO_PHONE=${TWILIO_PHONE:-}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      - REFRESH_TOKEN_EXPIRE_DAYS=${REFRESH_TOKEN_EXPIRE_DAYS:-30}
    volumes:
      - uploads:/app/data/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "from urllib.request import urlopen; urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  pgdata:
  uploads:
